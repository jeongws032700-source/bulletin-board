<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 커뮤니티</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">회원가입</h1>
    <p class="text-sm text-gray-400 mb-6">새 계정을 만들어보세요</p>

    <div id="errorMsg" class="hidden bg-red-50 text-red-500 text-sm rounded-xl p-3 mb-4 border border-red-100"></div>

    <form id="signupForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">아이디</label>
        <input id="username" type="text" placeholder="로그인에 사용할 아이디"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">닉네임</label>
        <input id="nickname" type="text" placeholder="게시판에 표시될 이름"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호를 입력하세요"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition" />
      </div>
      <button type="submit"
        class="w-full bg-gray-900 hover:bg-gray-700 text-white font-semibold py-2.5 rounded-xl transition mt-2">
        회원가입
      </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      이미 계정이 있으신가요?
      <a href="/login.html" class="text-gray-900 font-semibold hover:underline ml-1">로그인</a>
    </p>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');
      try {
        const res  = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, nickname, password }),
        });
        const data = await res.json();
        if (!res.ok) { errorMsg.textContent = data.message; errorMsg.classList.remove('hidden'); return; }
        alert('회원가입이 완료되었습니다.');
        window.location.href = '/login.html';
      } catch {
        errorMsg.textContent = '서버 연결에 실패했습니다.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
