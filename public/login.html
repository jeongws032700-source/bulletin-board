<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 커뮤니티</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">로그인</h1>
    <p class="text-sm text-gray-400 mb-6">커뮤니티에 오신 걸 환영합니다</p>

    <div id="errorMsg" class="hidden bg-red-50 text-red-500 text-sm rounded-xl p-3 mb-4 border border-red-100"></div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">아이디</label>
        <input id="username" type="text" placeholder="아이디를 입력하세요"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호를 입력하세요"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition" />
      </div>
      <button type="submit"
        class="w-full bg-gray-900 hover:bg-gray-700 text-white font-semibold py-2.5 rounded-xl transition mt-2">
        로그인
      </button>
    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      계정이 없으신가요?
      <a href="/signup.html" class="text-gray-900 font-semibold hover:underline ml-1">회원가입</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');
      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { errorMsg.textContent = data.message; errorMsg.classList.remove('hidden'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('nickname', data.nickname);
        localStorage.setItem('role', data.role || 'user');
        window.location.href = data.role === 'admin' ? '/admin.html' : '/';
      } catch {
        errorMsg.textContent = '서버 연결에 실패했습니다.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
