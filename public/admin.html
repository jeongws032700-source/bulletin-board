<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 - 커뮤니티</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-gray-900 text-white sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="text-gray-400 hover:text-white text-sm transition">← 게시판</a>
        <span class="text-gray-600">|</span>
        <h1 class="font-bold">관리자 페이지</h1>
      </div>
      <div class="flex items-center gap-3 text-sm">
        <span id="adminNickname" class="text-gray-300"></span>
        <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">

    <!-- 탭 -->
    <div class="flex gap-2 mb-6 border-b border-gray-200">
      <button onclick="showTab('users')" data-tab="users"
        class="tab-btn pb-3 px-4 text-sm font-semibold border-b-2 border-gray-900 text-gray-900 -mb-px transition">회원 관리</button>
      <button onclick="showTab('posts')" data-tab="posts"
        class="tab-btn pb-3 px-4 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-700 -mb-px transition">게시글 관리</button>
    </div>

    <!-- 회원 관리 -->
    <div id="tab-users">
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h2 class="font-semibold text-gray-900">전체 회원</h2>
          <span id="userCount" class="text-sm text-gray-400"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
              <tr>
                <th class="px-6 py-3 text-left">ID</th>
                <th class="px-6 py-3 text-left">아이디</th>
                <th class="px-6 py-3 text-left">닉네임</th>
                <th class="px-6 py-3 text-left">권한</th>
                <th class="px-6 py-3 text-left">게시글</th>
                <th class="px-6 py-3 text-left">가입일</th>
                <th class="px-6 py-3 text-left">관리</th>
              </tr>
            </thead>
            <tbody id="userTable" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 게시글 관리 -->
    <div id="tab-posts" class="hidden">
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h2 class="font-semibold text-gray-900">전체 게시글</h2>
          <span id="postCount" class="text-sm text-gray-400"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
              <tr>
                <th class="px-6 py-3 text-left">ID</th>
                <th class="px-6 py-3 text-left">제목</th>
                <th class="px-6 py-3 text-left">작성자</th>
                <th class="px-6 py-3 text-left">카테고리</th>
                <th class="px-6 py-3 text-left">조회수</th>
                <th class="px-6 py-3 text-left">작성일</th>
                <th class="px-6 py-3 text-left">관리</th>
              </tr>
            </thead>
            <tbody id="postTable" class="divide-y divide-gray-50"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <script>
    const token    = localStorage.getItem('token');
    const nickname = localStorage.getItem('nickname');
    const role     = localStorage.getItem('role');

    // 관리자 아닌 경우 차단
    if (!token || role !== 'admin') {
      alert('관리자만 접근 가능합니다.');
      window.location.href = '/';
    }

    document.getElementById('adminNickname').textContent = nickname + '님 (관리자)';

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('nickname');
      localStorage.removeItem('role');
      window.location.href = '/';
    }

    function showTab(tab) {
      document.getElementById('tab-users').classList.toggle('hidden', tab !== 'users');
      document.getElementById('tab-posts').classList.toggle('hidden', tab !== 'posts');
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const active = btn.dataset.tab === tab;
        btn.className = `tab-btn pb-3 px-4 text-sm border-b-2 -mb-px transition ${
          active ? 'font-semibold border-gray-900 text-gray-900' : 'font-medium border-transparent text-gray-400 hover:text-gray-700'
        }`;
      });
      if (tab === 'users') loadUsers();
      else loadPosts();
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    async function loadUsers() {
      const res   = await fetch('/api/admin/users', { headers: { Authorization: `Bearer ${token}` } });
      const users = await res.json();
      document.getElementById('userCount').textContent = `총 ${users.length}명`;
      document.getElementById('userTable').innerHTML = users.map(u => `
        <tr class="hover:bg-gray-50">
          <td class="px-6 py-3 text-gray-400">${u.id}</td>
          <td class="px-6 py-3 text-gray-700 font-medium">${escHtml(u.username)}</td>
          <td class="px-6 py-3 text-gray-700">${escHtml(u.nickname)}</td>
          <td class="px-6 py-3">
            <span class="px-2 py-0.5 rounded-full text-xs font-medium ${u.role === 'admin' ? 'bg-purple-50 text-purple-600' : 'bg-gray-100 text-gray-500'}">
              ${u.role}
            </span>
          </td>
          <td class="px-6 py-3 text-gray-500">${u.post_count}개</td>
          <td class="px-6 py-3 text-gray-400">${formatDate(u.created_at)}</td>
          <td class="px-6 py-3">
            ${u.role !== 'admin' ? `
            <div class="flex gap-1">
              <button onclick="changeRole(${u.id}, 'admin', '${escHtml(u.nickname)}')"
                class="text-xs text-purple-500 hover:text-purple-700 border border-purple-100 hover:border-purple-200 px-3 py-1 rounded-lg transition">
                관리자 지정
              </button>
              <button onclick="deleteUser(${u.id}, '${escHtml(u.nickname)}')"
                class="text-xs text-red-400 hover:text-red-600 border border-red-100 hover:border-red-200 px-3 py-1 rounded-lg transition">
                탈퇴
              </button>
            </div>` : `
            <button onclick="changeRole(${u.id}, 'user', '${escHtml(u.nickname)}')"
              class="text-xs text-gray-400 hover:text-gray-600 border border-gray-200 px-3 py-1 rounded-lg transition">
              권한 해제
            </button>`}
          </td>
        </tr>
      `).join('');
    }

    async function loadPosts() {
      const res   = await fetch('/api/admin/posts', { headers: { Authorization: `Bearer ${token}` } });
      const posts = await res.json();
      document.getElementById('postCount').textContent = `총 ${posts.length}개`;
      document.getElementById('postTable').innerHTML = posts.map(p => `
        <tr class="hover:bg-gray-50">
          <td class="px-6 py-3 text-gray-400">${p.id}</td>
          <td class="px-6 py-3 text-gray-700 font-medium max-w-xs truncate">
            <a href="/detail.html?id=${p.id}" target="_blank" class="hover:text-gray-900 hover:underline">${escHtml(p.title)}</a>
          </td>
          <td class="px-6 py-3 text-gray-500">${escHtml(p.author_name)}</td>
          <td class="px-6 py-3">
            <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">${escHtml(p.category)}</span>
          </td>
          <td class="px-6 py-3 text-gray-500">👁 ${p.views}</td>
          <td class="px-6 py-3 text-gray-400">${formatDate(p.created_at)}</td>
          <td class="px-6 py-3">
            <button onclick="deletePost(${p.id}, '${escHtml(p.title).substring(0,15)}')"
              class="text-xs text-red-400 hover:text-red-600 border border-red-100 hover:border-red-200 px-3 py-1 rounded-lg transition">
              삭제
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function changeRole(id, role, name) {
      const label = role === 'admin' ? '관리자로 지정' : '일반 회원으로 변경';
      if (!confirm(`'${name}'님을 ${label}하시겠습니까?`)) return;
      const res  = await fetch(`/api/admin/users/${id}/role`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ role }),
      });
      const data = await res.json();
      alert(data.message);
      if (res.ok) loadUsers();
    }

    async function deleteUser(id, name) {
      if (!confirm(`'${name}' 회원을 강제 탈퇴시키겠습니까?\n해당 회원의 게시글도 함께 삭제됩니다.`)) return;
      const res = await fetch(`/api/admin/users/${id}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      if (res.ok) loadUsers();
    }

    async function deletePost(id, title) {
      if (!confirm(`'${title}...' 게시글을 삭제하시겠습니까?`)) return;
      const res = await fetch(`/api/admin/posts/${id}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      alert(data.message);
      if (res.ok) loadPosts();
    }

    loadUsers();
  </script>
</body>
</html>
