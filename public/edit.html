<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 수정 - 커뮤니티</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-gray-900">커뮤니티</a>
      <span id="nicknameLabel" class="text-sm text-gray-500"></span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-8">
    <a id="cancelLink" href="/" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-700 transition mb-6">← 돌아가기</a>
    <h2 class="text-xl font-bold text-gray-900 mb-6">글 수정</h2>

    <div id="errorMsg" class="hidden bg-red-50 text-red-500 text-sm rounded-xl p-3 mb-4 border border-red-100"></div>

    <form id="editForm" class="bg-white rounded-2xl border border-gray-100 p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">카테고리</label>
        <select id="category"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition bg-white">
          <option value="자유게시판">자유게시판</option>
          <option value="공지사항">공지사항</option>
          <option value="질문답변">질문답변</option>
          <option value="정보공유">정보공유</option>
          <option value="이벤트">이벤트</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">제목</label>
        <input id="title" type="text"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">내용</label>
        <textarea id="content" rows="12"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 transition resize-none"></textarea>
      </div>
      <div class="flex gap-2 justify-end">
        <a id="cancelBtn" href="/" class="text-sm text-gray-500 hover:text-gray-900 border border-gray-200 px-5 py-2.5 rounded-xl transition">취소</a>
        <button type="submit" class="bg-gray-900 hover:bg-gray-700 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition">저장하기</button>
      </div>
    </form>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { alert('로그인이 필요합니다.'); window.location.href = '/login.html'; }
    document.getElementById('nicknameLabel').textContent = localStorage.getItem('nickname') + '님';

    const params = new URLSearchParams(location.search);
    const postId = params.get('id');
    if (!postId) window.location.href = '/';

    document.getElementById('cancelBtn').href  = `/detail.html?id=${postId}`;
    document.getElementById('cancelLink').href = `/detail.html?id=${postId}`;

    async function loadPost() {
      const res  = await fetch(`/api/posts/${postId}`);
      if (!res.ok) { window.location.href = '/'; return; }
      const post = await res.json();
      const meRes = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } });
      const me    = await meRes.json();
      if (!meRes.ok || me.id !== post.author_id) { alert('수정 권한이 없습니다.'); window.location.href = '/'; return; }

      document.getElementById('title').value   = post.title;
      document.getElementById('content').value = post.content;
      const sel = document.getElementById('category');
      if (post.category) sel.value = post.category;
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title    = document.getElementById('title').value.trim();
      const content  = document.getElementById('content').value.trim();
      const category = document.getElementById('category').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');
      if (!title || !content) { errorMsg.textContent = '제목과 내용을 모두 입력해주세요.'; errorMsg.classList.remove('hidden'); return; }
      const res  = await fetch(`/api/posts/${postId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ title, content, category }),
      });
      const data = await res.json();
      if (res.ok) { window.location.href = `/detail.html?id=${postId}`; }
      else { errorMsg.textContent = data.message; errorMsg.classList.remove('hidden'); }
    });

    loadPost();
  </script>
</body>
</html>
